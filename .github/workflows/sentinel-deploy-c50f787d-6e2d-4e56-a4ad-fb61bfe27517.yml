name: Deploy Content to loganalytics1 [c50f787d-6e2d-4e56-a4ad-fb61bfe27517]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-c50f787d-6e2d-4e56-a4ad-fb61bfe27517.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ uros-defender-test ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-c50f787d-6e2d-4e56-a4ad-fb61bfe27517.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'sentinel-rg'
      workspaceName: 'loganalytics1'
      workspaceId: 'a416424f-528d-4ee7-a360-9b7bec9a6fa0'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule,AutomationRule'
      branch: 'uros-defender-test'
      sourceControlId: 'c50f787d-6e2d-4e56-a4ad-fb61bfe27517'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_c50f787d6e2d4e56a4adfb61bfe27517 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-c50f787d-6e2d-4e56-a4ad-fb61bfe27517.ps1